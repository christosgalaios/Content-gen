name: Scrape Events & Trends

on:
  schedule:
    # Daily at 8am UTC — keep events and trends fresh
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape & Commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: "--experimental-sqlite"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Scrape Meetup events
        run: npx tsx pipeline/index.ts --stage events

      - name: Scrape TikTok trends
        run: npx tsx pipeline/index.ts --stage trends

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pipeline.db
          git diff --cached --quiet || git commit -m "Update scraped events and trends [skip ci]"
          git push
